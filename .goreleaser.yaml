version: 2

project_name: repo-cleanup-tui

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/ericdahl-dev/repo-cleanup-tui/internal/version.Version={{.Version}}
        -X github.com/ericdahl-dev/repo-cleanup-tui/internal/version.Commit={{.Commit}}
        -X github.com/ericdahl-dev/repo-cleanup-tui/internal/version.Date={{.Date}}
    main: .

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: repo-cleanup-tui
    directory: Formula
    repository:
      owner: ericdahl-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ericdahl-dev/repo-cleanup-tui"
    description: "TUI to find reclaimable node_modules in local git repos"
    license: "MIT"
    install: |
      bin.install "repo-cleanup-tui"
    test: |
      system "#{bin}/repo-cleanup-tui", "--help"

release:
  github:
    owner: ericdahl-dev
    name: repo-cleanup-tui
